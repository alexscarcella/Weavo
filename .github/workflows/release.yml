name: Release

on:
  push:
    tags:
      - 'v*'

# Needed so GITHUB_TOKEN can create a Release and upload assets.
permissions:
  contents: write

# Don't let two runs race over the same release (e.g. a tag deleted and re-pushed
# while a previous run for it is still in flight).
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v4

      - name: Read tag version
        id: tagver
        run: |
          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "Tag pushed: ${GITHUB_REF_NAME}"

      - name: Read APP_VERSION from source
        id: appver
        run: |
          FILE="js/ui/common/app-header.js"
          VERSION=$(grep -oP "const\s+APP_VERSION\s*=\s*'\K[^']+" "$FILE" | head -n1) || true
          if [ -z "$VERSION" ]; then
            echo "::error file=$FILE::Could not find a 'const APP_VERSION = \"...\"' declaration in $FILE."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "APP_VERSION in source: $VERSION"

      - name: Verify tag matches APP_VERSION
        run: |
          TAG="${{ steps.tagver.outputs.version }}"
          APP="${{ steps.appver.outputs.version }}"
          if [ "$TAG" != "$APP" ]; then
            echo "::error::Pushed tag '$TAG' does not match APP_VERSION '$APP' in js/ui/common/app-header.js. Update APP_VERSION to '$TAG', commit, delete this tag, and re-tag before releasing."
            exit 1
          fi
          echo "OK — tag and APP_VERSION agree: $TAG"

      - name: Build release zip
        run: |
          mkdir -p dist
          ZIP_NAME="weavo-${{ steps.tagver.outputs.version }}.zip"
          # git archive packages exactly what's tracked in the repo at this commit
          # for the given paths — untracked/gitignored content (e.g. sample-data/backup/)
          # can never end up in it, by construction.
          git archive --format=zip -o "dist/$ZIP_NAME" HEAD -- index.html favicon.svg css js sample-data
          echo "zip_path=dist/$ZIP_NAME" >> "$GITHUB_ENV"
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Weavo ${{ steps.tagver.outputs.version }}
          tag_name: ${{ steps.tagver.outputs.version }}
          files: ${{ env.zip_path }}
          fail_on_unmatched_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
